# API Contracts Registry für n8n-Workflows
# Format: JSON Schema + YAML für maschinelle Validierung
# Version: 2.0
# Datum: 2026-01-24

---

# ============================================================================
# TIER 1: PRIMITIVE MODULES
# ============================================================================

ssh_command_executor:
  module_name: "SSH Command Executor"
  file_path: "modules/primitives/ssh-command-executor.json"
  description: "Zentrale Komponente für SSH-Operationen mit Retry-Logik"
  tier: 1
  version: "2.0"

  input_schema:
    type: object
    required: ["host", "commands"]
    properties:
      host:
        type: string
        description: "IP-Adresse oder FQDN des Ziel-Systems"
        pattern: "^([0-9]{1,3}\\.){3}[0-9]{1,3}$|^[a-zA-Z0-9.-]+$"
        examples: ["10.1.1.5", "vm-prod-01", "10.1.1.5"]

      commands:
        type: array
        minItems: 1
        maxItems: 100
        items:
          type: string
        description: "SSH-Befehle zum sequentiellen Ausführen"
        examples: [["/system/identity/print", "/system/resource/print"]]

      auth_method:
        type: string
        enum: ["password", "key", "vault"]
        default: "password"
        description: "Authentifizierungsmethode"

      username:
        type: string
        default: "admin"
        description: "SSH-Benutzername"

      password:
        type: string
        description: "SSH-Passwort (Base64-codiert)"

      ssh_key:
        type: string
        description: "SSH-Privater Schlüssel (PEM oder Base64)"

      port:
        type: integer
        minimum: 1
        maximum: 65535
        default: 22
        description: "SSH-Port"

      timeout_seconds:
        type: integer
        minimum: 1
        maximum: 3600
        default: 30
        description: "Befehl-Timeout in Sekunden"

      max_retries:
        type: integer
        minimum: 0
        maximum: 10
        default: 3
        description: "Maximale Wiederholungsversuche"

      retry_delay:
        type: integer
        minimum: 1
        maximum: 300
        default: 5
        description: "Initiale Verzögerung vor Wiederholung (exponentieller Backoff)"

      continue_on_error:
        type: boolean
        default: false
        description: "Fortfahren bei Fehler"

      connection_check:
        type: boolean
        default: true
        description: "Konnektivität vor Ausführung prüfen"

      session_id:
        type: string
        description: "Eindeutige Session-ID (Auto-generiert wenn nicht vorhanden)"

    constraints:
      - "password und ssh_key können nicht beide spezifiziert sein"
      - "Mindestens eines von password oder ssh_key muss vorhanden sein"
      - "timeout_seconds >= 1"

  output_schema:
    type: object
    properties:
      exit_code:
        type: string
        enum: ["success", "partial", "failed"]
        description: "Gesamtstatus der Ausführung"

      session_id:
        type: string
        description: "Eindeutige Session-ID für Tracking"

      commands_executed:
        type: integer
        description: "Anzahl erfolgreich ausgeführter Befehle"

      commands_failed:
        type: integer
        description: "Anzahl fehlgeschlagener Befehle"

      results:
        type: array
        items:
          type: object
          properties:
            index:
              type: integer
              description: "Befehlsposition (0-basiert)"

            command:
              type: string
              description: "Der ausgeführte Befehl"

            exit_code:
              type: integer
              description: "SSH-Exit-Code (0 = Erfolg)"

            stdout:
              type: string
              description: "Befehlsausgabe"

            stderr:
              type: string
              description: "Fehlerausgabe"

            duration_seconds:
              type: number
              description: "Ausführungszeit in Sekunden"

            status:
              type: string
              enum: ["success", "timeout", "error"]
              description: "Status des einzelnen Befehls"

            error_message:
              type: string
              description: "Fehlertext (nur wenn failed)"

            attempt:
              type: integer
              description: "Welcher Versuch erfolgreich war"

      execution_summary:
        type: object
        properties:
          total_duration_seconds:
            type: number
          total_commands:
            type: integer
          success_rate:
            type: number
            minimum: 0
            maximum: 1
          started_at:
            type: string
            format: "date-time"
          completed_at:
            type: string
            format: "date-time"

      errors:
        type: array
        items:
          type: object
          properties:
            index: { type: integer }
            command: { type: string }
            error: { type: string }

# ============================================================================
# HTTP Request Wrapper
# ============================================================================

http_request_wrapper:
  module_name: "HTTP Request Wrapper"
  file_path: "modules/primitives/http-request-wrapper.json"
  tier: 1
  version: "2.0"

  input_schema:
    type: object
    required: ["url", "method"]
    properties:
      url:
        type: string
        format: "uri"
        description: "Vollständige URL"

      method:
        type: string
        enum: ["GET", "POST", "PUT", "PATCH", "DELETE"]
        default: "GET"

      headers:
        type: object
        additionalProperties:
          type: string

      body:
        description: "Request-Body (JSON)"

      query_params:
        type: object
        additionalProperties:
          type: string

      auth_type:
        type: string
        enum: ["none", "basic", "bearer", "api_key"]
        default: "none"

      timeout_seconds:
        type: integer
        minimum: 1
        maximum: 3600
        default: 30

      max_retries:
        type: integer
        minimum: 0
        maximum: 10
        default: 3

      ssl_verify:
        type: boolean
        default: true

      session_id:
        type: string

  output_schema:
    type: object
    properties:
      exit_code:
        type: string
        enum: ["success", "failed", "timeout"]

      status_code:
        type: integer
        minimum: 100
        maximum: 599

      body: {}

      headers:
        type: object

      duration_seconds:
        type: number

      session_id:
        type: string

      errors:
        type: array

# ============================================================================
# TIER 2: PLATFORM MODULES
# ============================================================================

vm_operations:
  module_name: "VM Operations"
  file_path: "modules/platforms/vm-operations.json"
  tier: 2
  version: "2.0"

  supported_operations:
    - name: "health_check"
      description: "uname, uptime, free, df, systemd status"
      timeout: 60

    - name: "collect_metrics"
      description: "CPU, Memory, Disk, Network stats"
      timeout: 120

    - name: "execute_update"
      description: "apt/dnf update, restart services"
      timeout: 900

    - name: "restart_service"
      description: "systemctl restart SERVICE"
      timeout: 300

    - name: "collect_logs"
      description: "journalctl, /var/log/*"
      timeout: 120

    - name: "validate_connectivity"
      description: "ping, ssh, service ports"
      timeout: 60

  input_schema:
    type: object
    required: ["vm_id", "operation", "host", "ssh_credentials"]
    properties:
      vm_id:
        oneOf:
          - { type: integer }
          - { type: string }

      operation:
        type: string
        enum: ["health_check", "collect_metrics", "execute_update", "restart_service", "collect_logs", "validate_connectivity"]

      host:
        type: string

      ssh_credentials:
        type: object
        required: ["method", "username"]
        properties:
          method:
            type: string
            enum: ["password", "key"]
          username:
            type: string
          password_or_key:
            type: string

      timeout_seconds:
        type: integer
        default: 60

      context:
        type: object

  output_schema:
    type: object
    properties:
      exit_code:
        type: string
        enum: ["success", "partial", "failed"]

      vm_info:
        type: object
        properties:
          id: { oneOf: [{ type: integer }, { type: string }] }
          name: { type: string }
          ip: { type: string }
          type: { type: string, enum: ["vm"] }

      operation_result:
        type: object

      metrics:
        type: object

      issues:
        type: array

      session_id:
        type: string

# ============================================================================
# LXC Operations
# ============================================================================

lxc_operations:
  module_name: "LXC Operations"
  file_path: "modules/platforms/lxc-operations.json"
  tier: 2
  version: "2.0"

  supported_operations:
    - name: "health_check"
      description: "lxc-info, cgroup stats, network config"
      timeout: 60

    - name: "collect_metrics"
      description: "Container-spezifische Metriken"
      timeout: 120

    - name: "execute_update"
      description: "apt/dnf update im Container"
      timeout: 900

    - name: "validate_connectivity"
      description: "ICMP, SSH zur Container-IP"
      timeout: 60

    - name: "monitor_cgroup"
      description: "cgroup CPU/Memory limits"
      timeout: 60

  input_schema:
    type: object
    required: ["lxc_id", "operation", "host", "ssh_credentials"]
    properties:
      lxc_id:
        oneOf:
          - { type: integer }
          - { type: string }

      operation:
        type: string
        enum: ["health_check", "collect_metrics", "execute_update", "validate_connectivity", "monitor_cgroup"]

      host:
        type: string

      ssh_credentials:
        type: object

      container_ip:
        type: string
        description: "IP des Containers (falls SSH zur Container-IP)"

      timeout_seconds:
        type: integer
        default: 60

  output_schema:
    type: object
    properties:
      exit_code:
        type: string
        enum: ["success", "partial", "failed"]

      lxc_info:
        type: object
        properties:
          id: { oneOf: [{ type: integer }, { type: string }] }
          name: { type: string }
          host_ip: { type: string }
          container_ip: { type: string }
          type: { type: string, enum: ["lxc"] }

      operation_result:
        type: object

      metrics:
        type: object

      session_id:
        type: string

# ============================================================================
# Device Operations (RouterOS, etc.)
# ============================================================================

device_operations:
  module_name: "Device Operations"
  file_path: "modules/platforms/device-operations.json"
  tier: 2
  version: "2.0"

  supported_operations:
    - name: "health_check"
      description: "/system/identity, /system/resource"
      timeout: 30

    - name: "collect_metrics"
      description: "CPU-Load, Memory, Interface-Stats"
      timeout: 60

    - name: "execute_config_change"
      description: "Firewall-Regeln, Interface-Config"
      timeout: 300

    - name: "validate_connectivity"
      description: "ICMP, BGP/OSPF status"
      timeout: 60

    - name: "collect_logs"
      description: "/log/print, /system/logging"
      timeout: 60

  input_schema:
    type: object
    required: ["device_id", "operation", "host", "ssh_credentials"]
    properties:
      device_id:
        oneOf:
          - { type: integer }
          - { type: string }

      operation:
        type: string
        enum: ["health_check", "collect_metrics", "execute_config_change", "validate_connectivity", "collect_logs"]

      host:
        type: string

      ssh_credentials:
        type: object

      device_type:
        type: string
        enum: ["routeros", "mikrotik", "cisco", "juniper"]
        default: "routeros"

      timeout_seconds:
        type: integer
        default: 30

  output_schema:
    type: object
    properties:
      exit_code:
        type: string
        enum: ["success", "partial", "failed"]

      device_info:
        type: object
        properties:
          id: { oneOf: [{ type: integer }, { type: string }] }
          name: { type: string }
          ip: { type: string }
          type: { type: string, enum: ["device"] }
          device_type: { type: string }

      operation_result:
        type: object

      metrics:
        type: object

      issues:
        type: array

      session_id:
        type: string

# ============================================================================
# TIER 3: FUNCTIONAL MODULES
# ============================================================================

unified_log_analyser:
  module_name: "Unified Log Analyser"
  file_path: "modules/functional/unified-log-analyser.json"
  tier: 3
  version: "2.0"
  replaces:
    - "sub-log-analyser-vm.json"
    - "sub-log-analyser-lxc.json"
    - "sub-log-analyser-device.json"
  code_savings: "51 KB (42% reduction)"
  description: "Parametrisierbare Log-Analyse für alle Systemtypen"

  input_schema:
    type: object
    required: ["object_type", "object_id", "host", "ssh_credentials"]
    properties:
      object_type:
        type: string
        enum: ["vm", "lxc", "device"]
        description: "ZielSystemtyp"

      object_id:
        oneOf:
          - { type: integer }
          - { type: string }
        description: "NetBox ID oder System-Identifier"

      host:
        type: string
        description: "IP oder FQDN"

      ssh_credentials:
        type: object
        required: ["method", "username"]
        properties:
          method:
            type: string
            enum: ["password", "key"]
          username:
            type: string
          password_or_key:
            type: string

      time_window_minutes:
        type: integer
        minimum: 1
        maximum: 10080
        default: 60
        description: "Wie weit zurück die Logs analysieren"

      severity_threshold:
        type: string
        enum: ["critical", "error", "warning", "info"]
        default: "error"

      exclude_patterns:
        type: array
        items:
          type: string
        description: "Regex-Muster zum Ignorieren"

      custom_patterns_file:
        type: string
        default: "/opt/Projekte/n8n-workflows/error_patterns.yaml"

      timeout_seconds:
        type: integer
        minimum: 10
        maximum: 3600
        default: 90

  output_schema:
    type: object
    properties:
      exit_code:
        type: string
        enum: ["success", "partial", "failed"]

      object_info:
        type: object
        properties:
          type:
            type: string
            enum: ["vm", "lxc", "device"]
          id: {}
          name: { type: string }
          ip: { type: string }

      issues:
        type: array
        items:
          type: object
          properties:
            severity:
              type: string
              enum: ["critical", "error", "warning", "info"]
            source: { type: string }
            timestamp: { type: string, format: "date-time" }
            message: { type: string }
            context: { type: string }
            pattern_matched: { type: string }
            recommendation: { type: string }

      summary:
        type: object
        properties:
          total_lines_analyzed: { type: integer }
          total_issues_found: { type: integer }
          by_severity:
            type: object
            properties:
              critical: { type: integer }
              error: { type: integer }
              warning: { type: integer }
              info: { type: integer }

      session_id: { type: string }
      execution_time_seconds: { type: number }

# ============================================================================
# Unified Health Checker
# ============================================================================

unified_health_checker:
  module_name: "Unified Health Checker"
  file_path: "modules/functional/unified-health-checker.json"
  tier: 3
  version: "2.0"

  input_schema:
    type: object
    required: ["object_type", "object_id", "host", "ssh_credentials"]
    properties:
      object_type:
        type: string
        enum: ["vm", "lxc", "device"]

      object_id:
        oneOf:
          - { type: integer }
          - { type: string }

      host: { type: string }

      ssh_credentials:
        type: object

      check_type:
        type: string
        enum: ["quick", "full"]
        default: "full"
        description: "quick = Basis-Checks, full = umfassend"

      thresholds:
        type: object
        properties:
          cpu_load_percent: { type: number, default: 80 }
          memory_percent: { type: number, default: 85 }
          disk_percent: { type: number, default: 90 }

      timeout_seconds:
        type: integer
        default: 60

  output_schema:
    type: object
    properties:
      exit_code:
        type: string
        enum: ["success", "warning", "failed"]

      health_status:
        type: string
        enum: ["healthy", "degraded", "unhealthy"]

      health_score:
        type: integer
        minimum: 0
        maximum: 100

      checks:
        type: array
        items:
          type: object
          properties:
            name: { type: string }
            status:
              type: string
              enum: ["pass", "warning", "fail"]
            value: { type: number }
            threshold: { type: number }
            message: { type: string }

      issues:
        type: array

      session_id: { type: string }

# ============================================================================
# Unified System Updater
# ============================================================================

unified_system_updater:
  module_name: "Unified System Updater"
  file_path: "modules/functional/unified-system-updater.json"
  tier: 3
  version: "2.0"

  input_schema:
    type: object
    required: ["object_type", "object_id", "host", "ssh_credentials"]
    properties:
      object_type:
        type: string
        enum: ["vm", "lxc", "device"]

      object_id:
        oneOf:
          - { type: integer }
          - { type: string }

      host: { type: string }

      ssh_credentials:
        type: object

      operation:
        type: string
        enum: ["check", "update", "dry-run"]
        default: "check"
        description: "check = list, update = apply, dry-run = simulate"

      update_type:
        type: string
        enum: ["security", "all"]
        default: "all"

      restart_if_needed: { type: boolean, default: true }
      pre_check: { type: boolean, default: true }
      post_check: { type: boolean, default: true }
      rollback_enabled: { type: boolean, default: true }

      timeout_seconds:
        type: integer
        default: 600

  output_schema:
    type: object
    properties:
      exit_code:
        type: string
        enum: ["success", "partial", "failed"]

      operation:
        type: string
        enum: ["check", "update", "dry-run"]

      update_summary:
        type: object
        properties:
          packages_available: { type: integer }
          packages_updated: { type: integer }
          security_updates: { type: integer }

      pre_check: { type: object }
      update_result: { type: object }
      post_check: { type: object }
      rollback_info: { type: object }

      session_id: { type: string }

# ============================================================================
# Issue Aggregator
# ============================================================================

issue_aggregator:
  module_name: "Issue Aggregator"
  file_path: "modules/functional/issue-aggregator.json"
  tier: 3
  version: "2.0"

  input_schema:
    type: object
    required: ["issues"]
    properties:
      issues:
        type: array
        items:
          type: object
          required: ["severity", "source", "message"]
          properties:
            severity:
              type: string
              enum: ["critical", "error", "warning", "info"]
            source: { type: string }
            timestamp: { type: string, format: "date-time" }
            message: { type: string }
            affected_system: { type: string }

      deduplication: { type: boolean, default: true }
      time_window_minutes: { type: integer, default: 60 }

      priority_weights:
        type: object
        properties:
          critical: { type: integer, default: 100 }
          error: { type: integer, default: 70 }
          warning: { type: integer, default: 40 }
          info: { type: integer, default: 10 }

      filter_by_source:
        type: array
        items: { type: string }

  output_schema:
    type: object
    properties:
      exit_code:
        type: string
        enum: ["success"]

      prioritized_issues:
        type: array
        items:
          type: object
          properties:
            issue_id: { type: string }
            priority_score: { type: integer, minimum: 0 }
            severity:
              type: string
              enum: ["critical", "error", "warning", "info"]
            affected_systems: { type: array, items: { type: string } }
            first_seen: { type: string, format: "date-time" }
            last_seen: { type: string, format: "date-time" }
            occurrence_count: { type: integer }

      summary:
        type: object
        properties:
          total_issues: { type: integer }
          by_severity: { type: object }
          by_priority_bucket: { type: object }

      session_id: { type: string }

# ============================================================================
# VERSION & METADATA
# ============================================================================

_metadata:
  version: "2.0"
  created: "2026-01-24"
  last_updated: "2026-01-24"
  total_modules: 14
  tiers:
    - tier: 1
      name: "Primitives"
      modules: 4
      purpose: "Low-level operations"

    - tier: 2
      name: "Platforms"
      modules: 3
      purpose: "System-spezifische Operationen"

    - tier: 3
      name: "Functional"
      modules: 4
      purpose: "Business-Logic Module"

    - tier: 4
      name: "Orchestration"
      modules: 3
      purpose: "Master-Workflows"

  backward_compatibility:
    deprecated_modules:
      - "sub-log-analyser-vm.json"
      - "sub-log-analyser-lxc.json"
      - "sub-log-analyser-device.json"
    replacement: "unified-log-analyser.json"
    migration_plan: "Schrittweise Migration über 4 Wochen"

  testing_strategy:
    unit_tests: "Pro Modul-Input/Output validieren"
    integration_tests: "Mit realen Systemen testen"
    e2e_tests: "Gesamtfluss validieren"

  sla_targets:
    ssh_execution_latency: "< 1000ms p95"
    http_request_latency: "< 500ms p95"
    log_analysis_throughput: "< 5s pro System"
    health_check_throughput: "< 2s pro System"
