# GitHub Labels Configuration for Issue Analysis Intelligence
# This file defines the label hierarchy used by the automated issue analysis system

# =============================================================================
# ISSUE TYPE LABELS (Auto-Applied by ML Classification)
# =============================================================================
- name: "type:feature-request"
  color: "0e8a16"
  description: "New feature or enhancement request (ML-detected)"

- name: "type:bug-report"  
  color: "d73a4a"
  description: "Bug report requiring investigation and fix (ML-detected)"

- name: "type:technical-debt"
  color: "fbca04"
  description: "Code quality improvement, refactoring needed (ML-detected)"

- name: "type:performance"
  color: "ff6347" 
  description: "Performance issue or optimization (ML-detected)"

- name: "type:documentation"
  color: "c2e0c6"
  description: "Documentation update or improvement (ML-detected)"

- name: "type:security"
  color: "b60205"
  description: "Security vulnerability or concern (ML-detected)"

# =============================================================================
# PRIORITY LABELS (Intelligence-Based Scoring)
# =============================================================================
- name: "priority:critical"
  color: "b60205"
  description: "Production-critical issues requiring immediate attention"

- name: "priority:high"
  color: "d93f0b" 
  description: "High priority (Code Quality focus, business-critical features)"

- name: "priority:medium"
  color: "fbca04"
  description: "Medium priority (standard features, non-critical bugs)"

- name: "priority:low"
  color: "0e8a16"
  description: "Low priority (documentation, minor enhancements)"

# =============================================================================  
# COMPLEXITY LABELS (ML-Estimated Effort)
# =============================================================================
- name: "complexity:high"
  color: "5319e7"
  description: "High complexity (>3 days, architecture changes, ML features)"

- name: "complexity:medium" 
  color: "7057ff"
  description: "Medium complexity (1-3 days, standard development)"

- name: "complexity:low"
  color: "bfdaff"
  description: "Low complexity (<1 day, simple changes, documentation)"

# =============================================================================
# TEAM ASSIGNMENT LABELS (Intelligent Routing)
# =============================================================================
- name: "team:ml"
  color: "ff1493"
  description: "Machine Learning / AI team (algorithms, predictions, analytics)"

- name: "team:backend"
  color: "1f77b4" 
  description: "Backend team (APIs, services, database integration)"

- name: "team:architecture"
  color: "ff7f0e"
  description: "Architecture team (Clean Architecture, refactoring, technical debt)"

- name: "team:performance"
  color: "2ca02c"
  description: "Performance team (optimization, SLA compliance, load testing)"

- name: "team:devops"
  color: "d62728"
  description: "DevOps team (infrastructure, deployment, monitoring)"

- name: "team:frontend"
  color: "9467bd"
  description: "Frontend team (UI/UX, user interface components)"

- name: "team:docs"
  color: "8c564b"
  description: "Documentation team (API docs, user guides, technical writing)"

- name: "team:security"
  color: "e377c2"
  description: "Security team (vulnerabilities, compliance, security reviews)"

# =============================================================================
# CLEAN ARCHITECTURE LABELS (Impact Assessment)
# =============================================================================
- name: "architecture:domain"
  color: "ff9999"
  description: "Affects Domain layer (entities, value objects, business logic)"

- name: "architecture:application"
  color: "ffcc99"
  description: "Affects Application layer (use cases, application services)"

- name: "architecture:infrastructure"
  color: "99ccff"  
  description: "Affects Infrastructure layer (repositories, external services)"

- name: "architecture:presentation"
  color: "99ff99"
  description: "Affects Presentation layer (controllers, API endpoints)"

- name: "architecture:cross-cutting"
  color: "cc99ff"
  description: "Affects multiple architecture layers (refactoring required)"

# =============================================================================
# PERFORMANCE LABELS (SLA Compliance)
# =============================================================================
- name: "performance:sla-violation"
  color: "ff0000"
  description: "Response time >0.12s or availability <99.9% (critical)"

- name: "performance:optimization"
  color: "ff6600"
  description: "Performance optimization opportunity identified"

- name: "performance:load-testing"
  color: "ffaa00"
  description: "Requires load testing for validation"

- name: "performance:caching"
  color: "ffdd00"
  description: "Caching strategy improvement needed"

# =============================================================================
# PATTERN ANALYSIS LABELS (Intelligence Insights)
# =============================================================================
- name: "pattern:recurring"
  color: "800080"
  description: "Part of recurring issue pattern (requires root cause analysis)"

- name: "pattern:systemic"
  color: "4b0082"
  description: "Indicates systemic issue (architecture review needed)"

- name: "pattern:dependency"
  color: "663399"
  description: "Has cross-team or cross-service dependencies"

# =============================================================================
# STATUS LABELS (Workflow State)  
# =============================================================================
- name: "status:analyzing"
  color: "f9d71c"
  description: "Currently being analyzed by intelligence system"

- name: "status:needs-review"
  color: "fbca04"
  description: "Requires human review after auto-analysis"

- name: "status:validated"
  color: "28a745"
  description: "Analysis validated and ready for development"

- name: "status:blocked"
  color: "6f42c1"
  description: "Blocked by dependencies or external factors"

# =============================================================================
# QUALITY GATE LABELS (Code Quality Focus)
# =============================================================================
- name: "quality:code-review"
  color: "0366d6"
  description: "Requires thorough code review (high complexity/risk)"

- name: "quality:testing"
  color: "28a745"
  description: "Requires comprehensive testing (unit, integration, performance)"

- name: "quality:compliance"
  color: "6f42c1"
