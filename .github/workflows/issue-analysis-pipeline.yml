name: 📊 Issue Analysis & Intelligence Pipeline

on:
  issues:
    types: [opened, edited, labeled, assigned]
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: read
  pull-requests: read

jobs:
  # =============================================================================
  # AUTOMATED ISSUE ANALYSIS & CLASSIFICATION
  # =============================================================================
  analyze-issue:
    name: 🧠 Intelligent Issue Analysis
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 50  # Get recent history for analysis

      - name: 🐍 Setup Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Analysis Dependencies
        run: |
          pip install --upgrade pip
          pip install requests PyGithub textblob scikit-learn nltk pandas numpy
          python -c "import nltk; nltk.download('vader_lexicon'); nltk.download('punkt')"

      - name: 🧠 Run Issue Intelligence Analysis
        id: analyze
        run: |
          python << 'EOF'
          import os
          import json
          import re
          from datetime import datetime, timedelta
          from typing import Dict, List, Any, Optional
          from textblob import TextBlob
          import requests
          from github import Github

          class IssueIntelligenceAnalyzer:
              def __init__(self, github_token: str, repo_name: str):
                  self.github = Github(github_token)
                  self.repo = self.github.get_repo(repo_name)
                  self.issue_number = int(os.environ.get('GITHUB_EVENT_ISSUE_NUMBER', '0'))
                  self.issue = self.repo.get_issue(self.issue_number) if self.issue_number > 0 else None

              def analyze_issue_comprehensive(self) -> Dict[str, Any]:
                  """Comprehensive issue analysis with multiple intelligence layers"""
                  if not self.issue:
                      return {"error": "Issue not found"}

                  analysis = {
                      "issue_number": self.issue_number,
                      "title": self.issue.title,
                      "type": self._classify_issue_type(),
                      "priority_analysis": self._analyze_priority(),
                      "complexity_analysis": self._analyze_complexity(),
                      "impact_analysis": self._analyze_business_impact(),
                      "technical_analysis": self._analyze_technical_aspects(),
                      "sentiment_analysis": self._analyze_sentiment(),
                      "similar_issues": self._find_similar_issues(),
                      "resource_estimation": self._estimate_resources(),
                      "clean_architecture_impact": self._analyze_architecture_impact(),
                      "performance_impact": self._analyze_performance_impact(),
                      "security_considerations": self._analyze_security_impact(),
                      "recommendations": self._generate_recommendations(),
                      "analysis_timestamp": datetime.now().isoformat()
                  }

                  return analysis

              def _classify_issue_type(self) -> Dict[str, Any]:
                  """Classify issue type using ML and pattern matching"""
                  title = self.issue.title.lower()
                  body = self.issue.body.lower() if self.issue.body else ""
                  combined_text = f"{title} {body}"

                  # Pattern-based classification
                  patterns = {
                      "bug": [r"\bbug\b", r"\berror\b", r"\bfail\b", r"\bbroken\b", r"\bissue\b", r"\bproblem\b"],
                      "feature": [r"\bfeat\b", r"\bfeature\b", r"\benhance\b", r"\badd\b", r"\bnew\b", r"\bimplement\b"],
                      "performance": [r"\bperf\b", r"\bslow\b", r"\bfast\b", r"\boptimize\b", r"\bresponse time\b"],
                      "security": [r"\bsecurity\b", r"\bauth\b", r"\bpermission\b", r"\bvulnerab\b", r"\bexploit\b"],
                      "documentation": [r"\bdoc\b", r"\breadme\b", r"\bguide\b", r"\bexample\b"],
                      "refactoring": [r"\brefactor\b", r"\bclean\b", r"\brestructure\b", r"\barchitecture\b"],
                      "testing": [r"\btest\b", r"\bunit test\b", r"\bintegration\b", r"\bcoverage\b"]
                  }

                  scores = {}
                  for issue_type, pattern_list in patterns.items():
                      score = sum(1 for pattern in pattern_list if re.search(pattern, combined_text))
                      if score > 0:
                          scores[issue_type] = score

                  # Determine primary and secondary types
                  if scores:
                      primary_type = max(scores.keys(), key=lambda k: scores[k])
                      confidence = scores[primary_type] / len(patterns[primary_type])
                  else:
                      primary_type = "general"
                      confidence = 0.5

                  return {
                      "primary_type": primary_type,
                      "confidence": round(confidence, 2),
                      "all_scores": scores,
                      "suggested_labels": self._suggest_labels_from_type(primary_type, scores)
                  }

              def _analyze_priority(self) -> Dict[str, Any]:
                  """Analyze and suggest issue priority based on multiple factors"""
                  priority_score = 0
                  factors = []

                  title = self.issue.title.lower()
                  body = self.issue.body.lower() if self.issue.body else ""
                  
                  # Critical keywords
                  critical_keywords = ["critical", "urgent", "production", "down", "security", "data loss"]
                  critical_matches = sum(1 for keyword in critical_keywords if keyword in f"{title} {body}")
                  if critical_matches > 0:
                      priority_score += critical_matches * 3
                      factors.append(f"Critical keywords found: {critical_matches}")

                  # High priority indicators
                  high_keywords = ["important", "major", "blocking", "regression", "performance"]
                  high_matches = sum(1 for keyword in high_keywords if keyword in f"{title} {body}")
                  if high_matches > 0:
                      priority_score += high_matches * 2
                      factors.append(f"High priority indicators: {high_matches}")

                  # Business impact indicators
                  business_keywords = ["user", "customer", "revenue", "business", "workflow"]
                  business_matches = sum(1 for keyword in business_keywords if keyword in f"{title} {body}")
                  if business_matches > 0:
                      priority_score += business_matches * 1
                      factors.append(f"Business impact indicators: {business_matches}")

                  # Determine priority level
                  if priority_score >= 6:
                      priority_level = "critical"
                  elif priority_score >= 4:
                      priority_level = "high"
                  elif priority_score >= 2:
                      priority_level = "medium"
                  else:
                      priority_level = "low"

                  return {
                      "priority_level": priority_level,
                      "priority_score": priority_score,
                      "factors": factors,
                      "suggested_sla": self._get_suggested_sla(priority_level)
                  }

              def _analyze_complexity(self) -> Dict[str, Any]:
                  """Analyze implementation complexity"""
                  complexity_indicators = {
                      "simple": ["fix", "update", "change", "modify", "small"],
                      "medium": ["add", "implement", "create", "integrate", "extend"],
                      "complex": ["refactor", "redesign", "architecture", "migration", "system"],
                      "epic": ["complete", "entire", "whole", "major", "overhaul"]
                  }

                  text = f"{self.issue.title} {self.issue.body or ''}".lower()
                  complexity_scores = {}
                  
                  for level, keywords in complexity_indicators.items():
                      score = sum(1 for keyword in keywords if keyword in text)
                      if score > 0:
                          complexity_scores[level] = score

                  if complexity_scores:
                      estimated_complexity = max(complexity_scores.keys(), key=lambda k: complexity_scores[k])
                  else:
                      estimated_complexity = "medium"  # Default

                  # Estimate effort
                  effort_mapping = {
                      "simple": {"days": "1-3", "story_points": 2},
                      "medium": {"days": "3-7", "story_points": 5},
                      "complex": {"days": "1-2 weeks", "story_points": 8},
                      "epic": {"days": "2+ weeks", "story_points": 13}
                  }

                  return {
                      "estimated_complexity": estimated_complexity,
                      "complexity_scores": complexity_scores,
                      "estimated_effort": effort_mapping.get(estimated_complexity, effort_mapping["medium"]),
                      "requires_architecture_review": estimated_complexity in ["complex", "epic"],
                      "requires_performance_review": "performance" in text
                  }

              def _analyze_business_impact(self) -> Dict[str, Any]:
                  """Analyze potential business impact"""
                  impact_indicators = {
                      "user_experience": ["ux", "ui", "user", "interface", "usability", "navigation"],
                      "performance": ["slow", "fast", "response", "load", "performance", "speed"],
                      "reliability": ["crash", "fail", "error", "bug", "stability", "uptime"],
                      "scalability": ["scale", "growth", "capacity", "load", "concurrent"],
                      "security": ["security", "auth", "permission", "vulnerability", "breach"],
                      "maintainability": ["clean", "refactor", "technical debt", "maintenance"],
                      "revenue": ["revenue", "profit", "cost", "business", "commercial"]
                  }

                  text = f"{self.issue.title} {self.issue.body or ''}".lower()
                  impact_scores = {}

                  for category, keywords in impact_indicators.items():
                      score = sum(1 for keyword in keywords if keyword in text)
                      if score > 0:
                          impact_scores[category] = score

                  # Calculate overall business impact
                  total_score = sum(impact_scores.values())
                  if total_score >= 8:
                      business_impact = "high"
                  elif total_score >= 4:
                      business_impact = "medium"
                  elif total_score >= 1:
                      business_impact = "low"
                  else:
                      business_impact = "minimal"

                  return {
                      "overall_impact": business_impact,
                      "impact_categories": impact_scores,
                      "total_impact_score": total_score,
                      "affected_stakeholders": self._identify_stakeholders(impact_scores),
                      "roi_potential": self._estimate_roi_potential(impact_scores)
                  }

              def _analyze_technical_aspects(self) -> Dict[str, Any]:
                  """Analyze technical aspects and service impact"""
                  services = {
                      "frontend": ["frontend", "ui", "interface", "html", "css", "javascript", "react", "vue"],
                      "backend": ["backend", "api", "server", "endpoint", "service", "microservice"],
                      "database": ["database", "db", "sql", "postgresql", "redis", "query", "schema"],
                      "ml_analytics": ["ml", "machine learning", "analytics", "prediction", "model", "algorithm"],
                      "event_bus": ["event", "bus", "messaging", "pubsub", "queue", "async"],
                      "infrastructure": ["deploy", "docker", "kubernetes", "infrastructure", "devops", "ci/cd"]
                  }

                  text = f"{self.issue.title} {self.issue.body or ''}".lower()
                  affected_services = {}

                  for service, keywords in services.items():
                      score = sum(1 for keyword in keywords if keyword in text)
                      if score > 0:
                          affected_services[service] = score

                  # Clean Architecture layer analysis
                  layers = {
                      "domain": ["domain", "business logic", "entity", "value object", "aggregate"],
                      "application": ["use case", "application", "service", "command", "query"],
                      "infrastructure": ["repository", "database", "external", "integration", "persistence"],
                      "presentation": ["controller", "api", "endpoint", "request", "response", "validation"]
                  }

                  affected_layers = {}
                  for layer, keywords in layers.items():
                      score = sum(1 for keyword in keywords if keyword in text)
                      if score > 0:
                          affected_layers[layer] = score

                  return {
                      "affected_services": affected_services,
                      "affected_clean_architecture_layers": affected_layers,
                      "breaking_changes_risk": self._assess_breaking_changes_risk(text),
                      "migration_required": "migration" in text or "breaking" in text,
                      "testing_strategy": self._suggest_testing_strategy(affected_services, affected_layers)
                  }

              def _analyze_sentiment(self) -> Dict[str, Any]:
                  """Analyze sentiment and urgency tone"""
                  text = f"{self.issue.title}. {self.issue.body or ''}"
                  
                  try:
                      blob = TextBlob(text)
                      polarity = blob.sentiment.polarity  # -1 to 1
                      subjectivity = blob.sentiment.subjectivity  # 0 to 1

                      # Categorize sentiment
                      if polarity > 0.3:
                          sentiment_category = "positive"
                      elif polarity < -0.3:
                          sentiment_category = "negative"
                      else:
                          sentiment_category = "neutral"

                      # Analyze urgency indicators
                      urgency_words = ["urgent", "asap", "immediately", "critical", "emergency", "now"]
                      urgency_score = sum(1 for word in urgency_words if word in text.lower())

                      return {
                          "sentiment_category": sentiment_category,
                          "polarity": round(polarity, 3),
                          "subjectivity": round(subjectivity, 3),
                          "urgency_score": urgency_score,
                          "tone": "urgent" if urgency_score > 0 else "normal",
                          "communication_style": "subjective" if subjectivity > 0.5 else "objective"
                      }
                  except:
                      return {
                          "sentiment_category": "neutral",
                          "error": "Sentiment analysis failed"
                      }

              def _find_similar_issues(self) -> List[Dict[str, Any]]:
                  """Find similar issues for context and patterns"""
                  similar_issues = []
                  
                  try:
                      # Search for similar issues
                      query_terms = self.issue.title.split()[:5]  # Use first 5 words
                      search_query = " ".join(query_terms)
                      
                      issues = self.repo.get_issues(state='all', sort='updated')
                      
                      current_words = set(self.issue.title.lower().split())
                      count = 0
                      
                      for issue in issues:
                          if count >= 5:  # Limit to top 5 similar issues
                              break
                          if issue.number == self.issue_number:
                              continue
                              
                          # Simple similarity based on title word overlap
                          issue_words = set(issue.title.lower().split())
                          overlap = len(current_words.intersection(issue_words))
                          
                          if overlap >= 2:  # At least 2 words in common
                              similar_issues.append({
                                  "number": issue.number,
                                  "title": issue.title,
                                  "state": issue.state,
                                  "similarity_score": overlap,
                                  "url": issue.html_url,
                                  "created_at": issue.created_at.isoformat(),
                                  "labels": [label.name for label in issue.labels]
                              })
                              count += 1
                  except Exception as e:
                      similar_issues = [{"error": f"Could not find similar issues: {str(e)}"}]

                  return similar_issues

              def _estimate_resources(self) -> Dict[str, Any]:
                  """Estimate required resources and timeline"""
                  complexity = self._analyze_complexity()["estimated_complexity"]
                  
                  resource_estimates = {
                      "simple": {
                          "developer_hours": "4-8",
                          "testing_hours": "2-4", 
                          "review_hours": "1-2",
                          "timeline_days": "1-2"
                      },
                      "medium": {
                          "developer_hours": "8-24",
                          "testing_hours": "4-8",
                          "review_hours": "2-4", 
                          "timeline_days": "2-5"
                      },
                      "complex": {
                          "developer_hours": "24-80",
                          "testing_hours": "8-16",
                          "review_hours": "4-8",
                          "timeline_days": "5-15"
                      },
                      "epic": {
                          "developer_hours": "80+",
                          "testing_hours": "16+",
                          "review_hours": "8+", 
                          "timeline_days": "15+"
                      }
                  }

                  estimate = resource_estimates.get(complexity, resource_estimates["medium"])
                  
                  return {
                      "complexity_level": complexity,
                      "estimated_resources": estimate,
                      "requires_multiple_developers": complexity in ["complex", "epic"],
                      "requires_architecture_review": complexity in ["complex", "epic"],
                      "suggested_milestone": self._suggest_milestone(complexity)
                  }

              def _analyze_architecture_impact(self) -> Dict[str, Any]:
                  """Analyze Clean Architecture impact"""
                  text = f"{self.issue.title} {self.issue.body or ''}".lower()
                  
                  architecture_indicators = {
                      "domain_changes": ["entity", "value object", "domain", "business rule", "aggregate"],
                      "application_changes": ["use case", "application service", "command", "query"],
                      "infrastructure_changes": ["repository", "database", "external service", "integration"],
                      "presentation_changes": ["api", "controller", "endpoint", "validation", "response"],
                      "cross_cutting": ["logging", "security", "validation", "error handling", "configuration"]
                  }

                  impact_areas = {}
                  for area, keywords in architecture_indicators.items():
                      score = sum(1 for keyword in keywords if keyword in text)
                      if score > 0:
                          impact_areas[area] = score

                  # Assess architecture compliance risk
                  compliance_risk = "low"
                  if len(impact_areas) > 2:
                      compliance_risk = "medium"
                  if any(score > 2 for score in impact_areas.values()):
                      compliance_risk = "high"

                  return {
                      "impact_areas": impact_areas,
                      "compliance_risk": compliance_risk,
                      "requires_architecture_review": compliance_risk != "low",
                      "layer_separation_risk": "domain_changes" in impact_areas and len(impact_areas) > 1,
                      "dependency_risk": self._assess_dependency_risk(text)
                  }

              def _analyze_performance_impact(self) -> Dict[str, Any]:
                  """Analyze potential performance impact"""
                  text = f"{self.issue.title} {self.issue.body or ''}".lower()
                  
                  performance_keywords = [
                      "slow", "fast", "performance", "optimize", "response time",
                      "latency", "throughput", "memory", "cpu", "database query",
                      "caching", "async", "concurrent", "parallel"
                  ]

                  performance_score = sum(1 for keyword in performance_keywords if keyword in text)
                  
                  if performance_score > 3:
                      impact_level = "high"
                  elif performance_score > 1:
                      impact_level = "medium"
                  elif performance_score > 0:
                      impact_level = "low"
                  else:
                      impact_level = "none"

                  return {
                      "performance_impact_level": impact_level,
                      "performance_score": performance_score,
                      "requires_performance_testing": performance_score > 0,
                      "affects_response_time_sla": "response time" in text or "sla" in text,
                      "monitoring_required": impact_level in ["medium", "high"]
                  }

              def _analyze_security_impact(self) -> Dict[str, Any]:
                  """Analyze security implications"""
                  text = f"{self.issue.title} {self.issue.body or ''}".lower()
                  
                  security_keywords = {
                      "authentication": ["auth", "login", "password", "token", "session"],
                      "authorization": ["permission", "role", "access", "privilege", "authorization"],
                      "data_protection": ["encrypt", "decrypt", "hash", "secure", "privacy"],
                      "input_validation": ["validate", "sanitize", "input", "xss", "injection"],
                      "vulnerability": ["vulnerability", "exploit", "security", "breach", "attack"]
                  }

                  security_findings = {}
                  for category, keywords in security_keywords.items():
                      score = sum(1 for keyword in keywords if keyword in text)
                      if score > 0:
                          security_findings[category] = score

                  total_security_score = sum(security_findings.values())
                  
                  if total_security_score > 3:
                      security_risk = "high"
                  elif total_security_score > 1:
                      security_risk = "medium"
                  elif total_security_score > 0:
                      security_risk = "low"
                  else:
                      security_risk = "none"

                  return {
                      "security_risk_level": security_risk,
                      "security_categories": security_findings,
                      "total_security_score": total_security_score,
                      "requires_security_review": security_risk != "none",
                      "requires_penetration_testing": security_risk == "high"
                  }

              def _generate_recommendations(self) -> Dict[str, Any]:
                  """Generate actionable recommendations"""
                  priority = self._analyze_priority()["priority_level"]
                  complexity = self._analyze_complexity()["estimated_complexity"]
                  impact = self._analyze_business_impact()["overall_impact"]
                  
                  recommendations = {
                      "immediate_actions": [],
                      "suggested_assignees": [],
                      "required_reviews": [],
                      "testing_strategy": [],
                      "deployment_considerations": [],
                      "monitoring_requirements": []
                  }

                  # Immediate actions based on priority
                  if priority == "critical":
                      recommendations["immediate_actions"].extend([
                          "Assign to senior developer immediately",
                          "Set up incident response if production affected",
                          "Create hotfix branch if applicable"
                      ])
                  
                  # Review requirements based on complexity
                  if complexity in ["complex", "epic"]:
                      recommendations["required_reviews"].extend([
                          "Architecture review required",
                          "Performance impact assessment needed",
                          "Multiple developer review sessions"
                      ])

                  # Testing strategy
                  tech_analysis = self._analyze_technical_aspects()
                  if "database" in tech_analysis["affected_services"]:
                      recommendations["testing_strategy"].append("Database migration testing required")
                  if "ml_analytics" in tech_analysis["affected_services"]:
                      recommendations["testing_strategy"].append("ML model validation testing required")

                  return recommendations

              # Helper methods
              def _suggest_labels_from_type(self, primary_type: str, scores: Dict[str, int]) -> List[str]:
                  """Suggest GitHub labels based on analysis"""
                  labels = [f"type/{primary_type}"]
                  
                  priority = self._analyze_priority()["priority_level"] 
                  labels.append(f"priority/{priority}")
                  
                  complexity = self._analyze_complexity()["estimated_complexity"]
                  labels.append(f"complexity/{complexity}")
                  
                  return labels

              def _get_suggested_sla(self, priority: str) -> str:
                  """Get suggested SLA for priority level"""
                  sla_mapping = {
                      "critical": "4 hours",
                      "high": "24 hours", 
                      "medium": "3 days",
                      "low": "1 week"
                  }
                  return sla_mapping.get(priority, "1 week")

              def _identify_stakeholders(self, impact_scores: Dict[str, int]) -> List[str]:
                  """Identify affected stakeholders"""
                  stakeholders = []
                  if "user_experience" in impact_scores:
                      stakeholders.append("UX Team")
                  if "performance" in impact_scores:
                      stakeholders.append("DevOps Team")
                  if "security" in impact_scores:
                      stakeholders.append("Security Team")
                  return stakeholders

              def _estimate_roi_potential(self, impact_scores: Dict[str, int]) -> str:
                  """Estimate ROI potential"""
                  if "revenue" in impact_scores or "performance" in impact_scores:
                      return "high"
                  elif "user_experience" in impact_scores:
                      return "medium"
                  else:
                      return "low"

              def _assess_breaking_changes_risk(self, text: str) -> str:
                  """Assess risk of breaking changes"""
                  breaking_indicators = ["breaking", "incompatible", "remove", "deprecated"]
                  if any(indicator in text for indicator in breaking_indicators):
                      return "high"
                  return "low"

              def _suggest_testing_strategy(self, services: Dict, layers: Dict) -> List[str]:
                  """Suggest testing strategy"""
                  strategies = ["Unit tests required"]
                  if len(services) > 1:
                      strategies.append("Integration tests required")
                  if "infrastructure" in layers:
                      strategies.append("End-to-end tests recommended")
                  return strategies

              def _assess_dependency_risk(self, text: str) -> str:
                  """Assess dependency violation risk"""
                  risky_patterns = ["direct database", "skip service", "tight coupling"]
                  if any(pattern in text for pattern in risky_patterns):
                      return "high"
                  return "low"

              def _suggest_milestone(self, complexity: str) -> str:
                  """Suggest milestone based on complexity"""
                  milestone_mapping = {
                      "simple": "Next Sprint",
                      "medium": "Current Quarter", 
                      "complex": "Next Quarter",
                      "epic": "Next Major Release"
                  }
                  return milestone_mapping.get(complexity, "Backlog")

          # Main execution
          if __name__ == "__main__":
              github_token = os.environ.get('GITHUB_TOKEN')
              repo_name = os.environ.get('GITHUB_REPOSITORY')
              
              if not github_token or not repo_name:
                  print("Missing required environment variables")
                  exit(1)

              analyzer = IssueIntelligenceAnalyzer(github_token, repo_name)
              analysis = analyzer.analyze_issue_comprehensive()
              
              # Output analysis results
              print("ANALYSIS_RESULT<<EOF")
              print(json.dumps(analysis, indent=2))
              print("EOF")

              # Set output for next steps
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f"analysis-json<<EOF\n")
                  f.write(json.dumps(analysis))
                  f.write(f"\nEOF\n")
                  f.write(f"issue-type={analysis.get('type', {}).get('primary_type', 'general')}\n")
                  f.write(f"priority-level={analysis.get('priority_analysis', {}).get('priority_level', 'medium')}\n")
                  f.write(f"complexity-level={analysis.get('complexity_analysis', {}).get('estimated_complexity', 'medium')}\n")
          EOF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}

      - name: 📊 Generate Analysis Report
        id: report
        run: |
          echo "ANALYSIS_REPORT<<EOF" >> $GITHUB_OUTPUT
          cat << 'REPORT_EOF' >> $GITHUB_OUTPUT
          ## 🧠 Automated Issue Analysis Report
          
          **Analysis Timestamp:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          
          ### 📋 Classification Results
          - **Issue Type:** ${{ steps.analyze.outputs.issue-type }}
          - **Priority Level:** ${{ steps.analyze.outputs.priority-level }}
          - **Complexity:** ${{ steps.analyze.outputs.complexity-level }}
          
          ### 🎯 Key Insights
          *Detailed analysis has been completed. Full results available in workflow logs.*
          
          ### 📈 Recommendations
          Based on the analysis, this issue has been automatically:
          - Classified and prioritized
          - Assessed for resource requirements
          - Analyzed for Clean Architecture impact
          - Evaluated for performance and security considerations
          
          **Next Steps:** Review team will be notified based on priority and complexity levels.
          REPORT_EOF

      - name: 🏷️ Apply Intelligent Labels
        uses: actions/github-script@v7
        with:
          script: |
            const analysis = JSON.parse(`${{ steps.analyze.outputs.analysis-json }}`);
            
            // Apply suggested labels
            const suggestedLabels = analysis.type?.suggested_labels || [];
            if (suggestedLabels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: suggestedLabels
              });
            }
            
            // Add analysis results as comment
            const analysisComment = `${{ steps.report.outputs.ANALYSIS_REPORT }}`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: analysisComment
            });

  # =============================================================================
  # PRIORITY ROUTING & TEAM ASSIGNMENT
  # =============================================================================
  priority-routing:
    name: 🚨 Priority-Based Routing
    runs-on: ubuntu-latest
    needs: analyze-issue
    if: github.event.action == 'opened'
    
    steps:
      - name: 🔥 Handle Critical Issues
        if: contains(github.event.issue.title, 'critical') || contains(github.event.issue.body, 'production down')
        uses: actions/github-script@v7
        with:
          script: |
            // Assign to oncall team for critical issues
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              assignees: ['MarcoFPO'] // Adjust to actual team leads
            });
            
            // Create urgent label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['priority/critical', 'needs-immediate-attention']
            });
            
            // Send notification (in real implementation, would use Slack/Teams)
            console.log('🚨 CRITICAL ISSUE DETECTED - Immediate attention required');

      - name: 🎯 Route Based on Analysis
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const body = context.payload.issue.body?.toLowerCase() || '';
            
            // Define team routing rules
            const routingRules = {
              'frontend': ['ui', 'frontend', 'interface', 'html', 'css', 'javascript'],
              'backend': ['api', 'backend', 'server', 'endpoint', 'database'],
              'ml-team': ['ml', 'machine learning', 'prediction', 'analytics', 'model'],
              'devops': ['deploy', 'infrastructure', 'ci/cd', 'docker', 'kubernetes'],
              'security': ['security', 'auth', 'vulnerability', 'permission']
            };
            
            const text = `${title} ${body}`;
            let assignedTeam = null;
            
            for (const [team, keywords] of Object.entries(routingRules)) {
              if (keywords.some(keyword => text.includes(keyword))) {
                assignedTeam = team;
                break;
              }
            }
            
            if (assignedTeam) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [`team/${assignedTeam}`]
              });
              
              console.log(`🎯 Routed to team: ${assignedTeam}`);
            }

  # =============================================================================
  # CONTINUOUS ANALYSIS & PATTERN DETECTION
  # =============================================================================
  pattern-analysis:
    name: 📈 Pattern Analysis & Insights
    runs-on: ubuntu-latest
    needs: analyze-issue
    if: github.event.action == 'opened'
    
    steps:
      - name: 📊 Analyze Issue Patterns
        uses: actions/github-script@v7
        with:
          script: |
            // Get recent issues for pattern analysis
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              per_page: 50,
              sort: 'created',
              direction: 'desc'
            });
            
            // Analyze patterns
            const patterns = {
              bugCount: 0,
              featureCount: 0,
              performanceCount: 0,
              recentTrends: {}
            };
            
            issues.data.forEach(issue => {
              const title = issue.title.toLowerCase();
              if (title.includes('bug') || title.includes('error')) {
                patterns.bugCount++;
              }
              if (title.includes('feature') || title.includes('enhance')) {
                patterns.featureCount++;
              }
              if (title.includes('performance') || title.includes('slow')) {
                patterns.performanceCount++;
              }
            });
            
            // Create pattern analysis comment
            const currentIssueTitle = context.payload.issue.title.toLowerCase();
            let patternInsight = "## 📈 Issue Pattern Analysis\n\n";
            
            if (patterns.bugCount > 10 && (currentIssueTitle.includes('bug') || currentIssueTitle.includes('error'))) {
              patternInsight += "⚠️ **High Bug Volume Detected:** This appears to be part of a pattern of recent bug reports. Consider root cause analysis.\n\n";
            }
            
            if (patterns.performanceCount > 5 && currentIssueTitle.includes('performance')) {
              patternInsight += "🐌 **Performance Pattern:** Multiple recent performance issues detected. System-wide performance review recommended.\n\n";
            }
            
            patternInsight += `**Recent Issue Distribution:**\n- 🐛 Bugs: ${patterns.bugCount}\n- ✨ Features: ${patterns.featureCount}\n- ⚡ Performance: ${patterns.performanceCount}\n`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: patternInsight
            });

  # =============================================================================
  # QUALITY GATE INTEGRATION
  # =============================================================================
  quality-gate-integration:
    name: 🔍 Quality Gate Integration
    runs-on: ubuntu-latest
    needs: analyze-issue
    if: github.event.action == 'opened' && (contains(github.event.issue.title, 'feat') || contains(github.event.issue.title, 'feature'))
    
    steps:
      - name: 📋 Generate Quality Checklist
        uses: actions/github-script@v7
        with:
          script: |
            const qualityChecklist = `
            ## 🔍 Quality Gate Checklist
            
            Based on the analysis, please ensure the following quality gates are met:
            
            ### 🏗️ Clean Architecture Compliance
            - [ ] Domain layer changes follow business logic principles
            - [ ] Application layer properly orchestrates use cases
            - [ ] Infrastructure layer abstractions are maintained
            - [ ] Presentation layer only handles UI concerns
            - [ ] Dependency flow follows Clean Architecture rules
            
            ### ⚡ Performance Requirements  
            - [ ] Response time targets (<0.12s) are considered
            - [ ] Performance impact has been assessed
            - [ ] Caching strategy defined if applicable
            - [ ] Database query optimization reviewed
            - [ ] Concurrent execution patterns validated
            
            ### 🧪 Testing Strategy
            - [ ] Unit tests planned for business logic
            - [ ] Integration tests for service interactions
            - [ ] Performance tests for critical paths
            - [ ] End-to-end tests for user workflows
            - [ ] Test coverage targets defined (≥80%)
            
            ### 🔒 Security Considerations
            - [ ] Input validation requirements identified
            - [ ] Authentication/authorization impact assessed
            - [ ] Data protection requirements defined
            - [ ] Security scanning planned
            - [ ] Vulnerability assessment completed
            
            ### 📚 Documentation Requirements
            - [ ] API documentation updates planned
            - [ ] Architecture decision records needed
            - [ ] User documentation impact assessed
            - [ ] Code comments for complex logic
            - [ ] Deployment guide updates required
            
            ---
            *This checklist was automatically generated based on issue analysis. Please review and check off items as they are completed.*
            `;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: qualityChecklist
            });