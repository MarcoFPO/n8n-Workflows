                  "deployment_failures": "immediate",
                  "infrastructure": "within_30m",
                  "monitoring": "within_1h"
                },
                "expertise_keywords": [
                  "deployment", "infrastructure", "production",
                  "monitoring", "devops", "ci/cd", "docker"
                ]
              },
              "frontend-team": {
                "slack_channel": "#frontend-ui",
                "github_team": "@aktienanalyse-ecosystem/frontend-team",
                "notification_preferences": {
                  "ui_bugs": "within_30m",
                  "feature_requests": "within_1h", 
                  "user_experience": "within_2h",
                  "design_changes": "daily_digest"
                },
                "expertise_keywords": [
                  "frontend", "ui", "ux", "javascript", "typescript",
                  "react", "vue", "html", "css", "user interface"
                ]
              },
              "docs-team": {
