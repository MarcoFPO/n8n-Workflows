name: Unified Import System CI/CD - Issue #57

on:
  push:
    branches: [ main, feature/issue-57-unified-import-system ]
  pull_request:
    branches: [ main ]

jobs:
  unified-import-validation:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, 3.10, 3.11]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov flake8 black isort
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Code Quality - Black Formatting
      run: |
        black --check --diff scripts/unified_import_system_migration.py
        black --check --diff tests/test_*unified*
    
    - name: Code Quality - isort Import Sorting
      run: |
        isort --check-only --diff scripts/unified_import_system_migration.py
        isort --check-only --diff tests/test_*unified*
    
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 scripts/unified_import_system_migration.py --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 scripts/unified_import_system_migration.py --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Validate No sys.path.insert Anti-Patterns
      run: |
        echo "Checking for sys.path.insert anti-patterns..."
        VIOLATIONS=$(find services -name "*.py" -not -path "*/venv/*" -exec grep -l "sys.path.insert" {} \;)
        if [ ! -z "$VIOLATIONS" ]; then
          echo "❌ Found sys.path.insert anti-patterns in:"
          echo "$VIOLATIONS"
          exit 1
        else
          echo "✅ No sys.path.insert anti-patterns found"
        fi
    
    - name: Validate Standard Import Manager Usage
      run: |
        echo "Checking Standard Import Manager usage..."
        MISSING_SERVICES=()
        for service in broker-gateway-service intelligent-core-service ml-analytics-service; do
          MAIN_FILE="services/$service/main.py"
          if [ -f "$MAIN_FILE" ]; then
            if ! grep -q "StandardImportManager" "$MAIN_FILE"; then
              MISSING_SERVICES+=("$service")
            fi
          fi
        done
        
        if [ ${#MISSING_SERVICES[@]} -gt 0 ]; then
          echo "❌ Services missing StandardImportManager: ${MISSING_SERVICES[*]}"
          exit 1
        else
          echo "✅ All target services use StandardImportManager"
        fi
    
    - name: Run Migration Tests
      run: |
        if [ -f "tests/test_unified_import_system_migration.py" ]; then
          pytest tests/test_unified_import_system_migration.py -v --tb=short
        else
          echo "⚠️ Migration tests not found - skipping"
        fi
    
    - name: Run Integration Tests
      run: |
        if [ -f "tests/test_standard_import_manager_integration.py" ]; then
          pytest tests/test_standard_import_manager_integration.py -v --tb=short --cov=shared
        else
          echo "⚠️ Integration tests not found - skipping"
        fi
    
    - name: Performance Benchmark
      run: |
        python -c "
import time
import sys
from pathlib import Path

project_root = str(Path.cwd())
sys.path.insert(0, project_root)

try:
    from shared.standard_import_manager_v1_0_0_20250824 import StandardImportManager
    
    # Benchmark initialization time
    times = []
    for i in range(10):
        start = time.time()
        manager = StandardImportManager()
        manager.setup_imports()
        end = time.time()
        times.append(end - start)
    
    avg_time = sum(times) / len(times)
    print(f'✅ StandardImportManager avg init time: {avg_time:.4f}s')
    
    if avg_time > 0.5:  # Should initialize in < 500ms
        print('❌ Performance degradation detected')
        sys.exit(1)
    else:
        print('✅ Performance benchmarks passed')
        
except ImportError as e:
    print(f'⚠️ StandardImportManager not available: {e}')
    print('Skipping performance benchmark')
"
  
  security-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Security Scan - Check for Hardcoded Secrets
      run: |
        echo "Scanning for potential secrets..."
        if grep -r -i "password\|secret\|key\|token" scripts/unified_import_system_migration.py; then
          echo "⚠️ Potential secrets found - please review"
        else
          echo "✅ No hardcoded secrets detected"
        fi
  
  architecture-compliance:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: SOLID Principles Validation
      run: |
        echo "Validating SOLID Principles compliance..."
        
        # Single Responsibility Check
        CLASSES=$(grep -r "class.*:" scripts/unified_import_system_migration.py | wc -l)
        echo "Classes found: $CLASSES"
        
        # Dependency Inversion Check
        if grep -q "ABC\|abstractmethod" scripts/unified_import_system_migration.py; then
          echo "✅ Abstract interfaces found - Dependency Inversion"
        else
          echo "⚠️ Consider adding abstract interfaces"
        fi
        
        echo "✅ Architecture compliance validated"
  
  migration-dry-run:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Migration Dry Run Test
      run: |
        python -c "
import sys
from pathlib import Path
sys.path.insert(0, str(Path.cwd()))

try:
    from scripts.unified_import_system_migration import UnifiedImportSystemMigrator
    
    # Test migrator initialization
    migrator = UnifiedImportSystemMigrator()
    analysis = migrator.analyze_current_imports()
    
    print(f'✅ Migration analysis completed')
    print(f'Services analyzed: {len(analysis)}')
    
    for service, info in analysis.items():
        if info.get('needs_migration'):
            print(f'  📋 {service}: needs migration')
        elif info.get('has_standard_manager'):
            print(f'  ✅ {service}: already migrated')
    
except Exception as e:
    print(f'❌ Migration dry run failed: {e}')
    sys.exit(1)
"