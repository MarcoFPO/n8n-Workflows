version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ernaehrung-postgres
    environment:
      POSTGRES_DB: ernaehrung_app
      POSTGRES_USER: ernaehrung_user
      POSTGRES_PASSWORD: secure_password
      POSTGRES_HOST_AUTH_METHOD: md5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - ernaehrung-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ernaehrung_user -d ernaehrung_app"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis (for caching and ML model storage)
  redis:
    image: redis:7-alpine
    container_name: ernaehrung-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ernaehrung-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # FastAPI Backend
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: ernaehrung-backend
    environment:
      - DATABASE_URL=postgresql://ernaehrung_user:secure_password@postgres/ernaehrung_app
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=false
      - ENABLE_ML=true
      - ENABLE_OCR=true
    volumes:
      - app_uploads:/opt/ernaehrungs-app/uploads
      - app_models:/opt/ernaehrungs-app/models
      - app_logs:/var/log/ernaehrung-app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ernaehrung-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: ernaehrung-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ../frontend:/usr/share/nginx/html
      - app_logs:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - ernaehrung-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus (Monitoring)
  prometheus:
    image: prom/prometheus:latest
    container_name: ernaehrung-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - ernaehrung-network
    restart: unless-stopped

  # Grafana (Dashboards)
  grafana:
    image: grafana/grafana:latest
    container_name: ernaehrung-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - ernaehrung-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  app_uploads:
  app_models:
  app_logs:
  prometheus_data:
  grafana_data:

networks:
  ernaehrung-network:
    driver: bridge