<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Ernährungs-App</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        .metric-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .metric-value {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .metric-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        .recipe-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            margin-bottom: 20px;
        }
        
        .recipe-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        
        .meal-type-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1;
        }
        
        .chart-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        .user-switcher {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
        }
        
        .navbar-brand {
            font-weight: bold;
            font-size: 1.5rem;
        }
        
        .btn-primary-custom {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 10px 20px;
        }
        
        .btn-outline-custom {
            border: 2px solid #667eea;
            color: #667eea;
            border-radius: 10px;
            padding: 8px 16px;
        }
        
        .btn-outline-custom:hover {
            background: #667eea;
            color: white;
        }
        
        .inventory-alert {
            border-left: 4px solid #f39c12;
            background: rgba(243, 156, 18, 0.1);
        }
        
        .expiring-alert {
            border-left: 4px solid #e74c3c;
            background: rgba(231, 76, 60, 0.1);
        }
    </style>
</head>
<body class="bg-light">
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-seedling me-2"></i>
                Ernährungs-App
            </a>
            
            <div class="navbar-nav me-auto">
                <a class="nav-link active" href="/dashboard">
                    <i class="fas fa-tachometer-alt me-1"></i>
                    Dashboard
                </a>
                <a class="nav-link" href="/recipes">
                    <i class="fas fa-book-open me-1"></i>
                    Rezepte
                </a>
                <a class="nav-link" href="/inventory">
                    <i class="fas fa-boxes me-1"></i>
                    Bestand
                </a>
                <a class="nav-link" href="/health">
                    <i class="fas fa-heart me-1"></i>
                    Gesundheit
                </a>
            </div>
            
            <!-- User Switcher -->
            <select id="userSelect" class="form-select form-select-sm user-switcher me-3" style="max-width: 150px;">
                <option value="1">👤 Person 1</option>
                <option value="2">👤 Person 2</option>
            </select>
            
            <span class="navbar-text">
                <i class="fas fa-calendar me-2"></i>
                <span id="currentDate"></span>
            </span>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Quick Metrics Row -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="metric-card text-center">
                    <div class="metric-value" id="todayCalories">0</div>
                    <div class="metric-label">
                        <i class="fas fa-fire me-1"></i>
                        Kalorien heute
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="metric-card text-center">
                    <div class="metric-value" id="currentWeight">--</div>
                    <div class="metric-label">
                        <i class="fas fa-weight me-1"></i>
                        Aktuelles Gewicht (kg)
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="metric-card text-center">
                    <div class="metric-value" id="weeklyMeals">0</div>
                    <div class="metric-label">
                        <i class="fas fa-utensils me-1"></i>
                        Mahlzeiten diese Woche
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="metric-card text-center">
                    <div class="metric-value" id="inventoryItems">0</div>
                    <div class="metric-label">
                        <i class="fas fa-boxes me-1"></i>
                        Produkte im Bestand
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content Row -->
        <div class="row">
            <!-- Left Column: Recipe Suggestions -->
            <div class="col-lg-8">
                <h2 class="mb-3">
                    <i class="fas fa-magic me-2"></i>
                    Heutige Rezeptvorschläge
                </h2>
                
                <!-- Breakfast -->
                <div class="mb-4">
                    <h5 class="text-muted mb-3">
                        <i class="fas fa-sun me-2"></i>
                        Frühstück
                    </h5>
                    <div class="row" id="breakfastSuggestions">
                        <!-- Will be populated by JavaScript -->
                    </div>
                </div>

                <!-- Lunch -->
                <div class="mb-4">
                    <h5 class="text-muted mb-3">
                        <i class="fas fa-sun me-2"></i>
                        Mittagessen
                    </h5>
                    <div class="row" id="lunchSuggestions">
                        <!-- Will be populated by JavaScript -->
                    </div>
                </div>

                <!-- Dinner -->
                <div class="mb-4">
                    <h5 class="text-muted mb-3">
                        <i class="fas fa-moon me-2"></i>
                        Abendessen
                    </h5>
                    <div class="row" id="dinnerSuggestions">
                        <!-- Will be populated by JavaScript -->
                    </div>
                </div>
            </div>

            <!-- Right Column: Health & Inventory -->
            <div class="col-lg-4">
                <!-- Health Chart -->
                <div class="chart-container">
                    <h5 class="mb-3">
                        <i class="fas fa-chart-line me-2"></i>
                        Gewichtsverlauf
                    </h5>
                    <canvas id="weightChart" height="200"></canvas>
                </div>

                <!-- Inventory Alerts -->
                <div class="chart-container">
                    <h5 class="mb-3">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        Bestandshinweise
                    </h5>
                    <div id="inventoryAlerts">
                        <!-- Will be populated by JavaScript -->
                    </div>
                </div>

                <!-- Quick Actions -->
                <div class="chart-container">
                    <h5 class="mb-3">
                        <i class="fas fa-bolt me-2"></i>
                        Schnellaktionen
                    </h5>
                    <div class="d-grid gap-2">
                        <button class="btn btn-primary-custom" onclick="openReceiptScanner()">
                            <i class="fas fa-camera me-2"></i>
                            Kassenbon scannen
                        </button>
                        <button class="btn btn-outline-custom" onclick="addHealthMetrics()">
                            <i class="fas fa-plus me-2"></i>
                            Gesundheitsdaten erfassen
                        </button>
                        <button class="btn btn-outline-custom" onclick="viewShoppingList()">
                            <i class="fas fa-shopping-cart me-2"></i>
                            Einkaufsliste
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <!-- Receipt Scanner Modal -->
    <div class="modal fade" id="receiptModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="fas fa-camera me-2"></i>
                        Kassenbon scannen
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="file" id="receiptFile" class="form-control" accept="image/*">
                    <div class="mt-3" id="receiptPreview" style="display: none;">
                        <img id="receiptImage" class="img-fluid" alt="Receipt Preview">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Abbrechen</button>
                    <button type="button" class="btn btn-primary" onclick="uploadReceipt()">
                        <i class="fas fa-upload me-1"></i>
                        Hochladen & Scannen
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JavaScript -->
    <script src="/static/js/dashboard.js"></script>
</body>
</html>
